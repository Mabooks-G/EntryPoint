services:
  - type: web
    name: entrypoint-app
    env: python
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      npm install
      npm run build
    startCommand: |
      uvicorn backend.app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VITE_API_BASE
        value: https://entrypoint-app.onrender.com
    staticPublishPath: ./dist